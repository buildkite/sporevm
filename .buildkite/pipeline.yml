steps:
  - label: ":zig: Build & Test (Linux)"
    command: |
      mise install
      mise exec -- zig build test --summary all
      mise exec -- zig fmt --check build.zig src
    plugins:
      - mise#a5845c5082d3a4fe36dd77ae74973dfc86fc91a2:
          version: "2026.5.12"
    cache:
      paths:
        - "~/.local/share/mise"
        - "~/.cache/mise"
        - "~/.local/state/mise"
      size: "20g"
      name: "mise-cache"
    agents:
      queue: cleanroom

  - label: ":zig: Build & Test (macOS)"
    command: |
      mise install
      mise exec -- zig build test --summary all
    plugins:
      - mise#a5845c5082d3a4fe36dd77ae74973dfc86fc91a2:
          version: "2026.5.12"
    cache:
      paths:
        - "~/.local/share/mise"
        - "~/.cache/mise"
        - "~/.local/state/mise"
      size: "20g"
      name: "mise-cache"
    agents:
      queue: cleanroom-mac

  - label: ":chart_with_upwards_trend: Benchmark Suite"
    if: build.branch == "main" || build.env("SPOREVM_RUN_BENCHMARKS") == "1"
    command: |
      upload_benchmark_artifacts() {
        buildkite-agent artifact upload "zig-cache/sporevm-benchmarks/latest-summary.json" || true
        buildkite-agent artifact upload "zig-cache/sporevm-benchmarks/*/config.json" || true
        buildkite-agent artifact upload "zig-cache/sporevm-benchmarks/*/results.jsonl" || true
        buildkite-agent artifact upload "zig-cache/sporevm-benchmarks/*/summary.json" || true
        buildkite-agent artifact upload "zig-cache/sporevm-benchmarks/*/logs/*" || true
        buildkite-agent artifact upload "zig-cache/sporevm-benchmarks/*/rootfs-cache/*.json" || true
      }
      annotate_benchmark_results() {
        local status="$1"
        local summary="zig-cache/sporevm-benchmarks/latest-summary.json"
        [[ -f "${summary}" ]] || return 0

        local annotation="zig-cache/sporevm-benchmarks/buildkite-annotation.md"
        scripts/annotate-sporevm-benchmarks.py "${summary}" > "${annotation}" || return 0

        local style="success"
        if [[ "${status}" != "0" ]]; then
          style="warning"
        fi
        buildkite-agent annotate --style "${style}" --context "sporevm-benchmarks" --priority 7 < "${annotation}" || true
        buildkite-agent artifact upload "${annotation}" || true
      }
      finish_benchmark_step() {
        local status="$?"
        upload_benchmark_artifacts
        annotate_benchmark_results "${status}"
        exit "${status}"
      }
      trap finish_benchmark_step EXIT

      mise install
      mise run build
      scripts/benchmark-sporevm-suite.py --profile "${SPOREVM_BENCHMARK_PROFILE:-comparison}" --no-build
      if [[ -n "${SPOREVM_BENCHMARK_BASELINE:-}" ]]; then
        scripts/compare-sporevm-benchmarks.py "${SPOREVM_BENCHMARK_BASELINE}" zig-cache/sporevm-benchmarks/latest-summary.json
      fi
    plugins:
      - mise#a5845c5082d3a4fe36dd77ae74973dfc86fc91a2:
          version: "2026.5.12"
    cache:
      paths:
        - "~/.local/share/mise"
        - "~/.cache/mise"
        - "~/.local/state/mise"
      size: "20g"
      name: "mise-cache"
    agents:
      queue: cleanroom-mac

  - wait

  - label: ":package: Build Linux ARM64 release archive"
    key: "release-linux-arm64"
    if: build.tag != null
    command: |
      mise install
      scripts/build-release-assets.sh --target linux-arm64 --output dist
    artifact_paths:
      - "dist/spore_Linux_arm64.tar.gz"
    plugins:
      - mise#a5845c5082d3a4fe36dd77ae74973dfc86fc91a2:
          version: "2026.5.12"
    cache:
      paths:
        - "~/.local/share/mise"
        - "~/.cache/mise"
        - "~/.local/state/mise"
      size: "20g"
      name: "mise-cache"
    agents:
      queue: cleanroom

  - label: ":package: Build macOS ARM64 release archive"
    key: "release-darwin-arm64"
    if: build.tag != null
    command: |
      mise install
      scripts/build-release-assets.sh --target darwin-arm64 --output dist
    artifact_paths:
      - "dist/spore_Darwin_arm64.tar.gz"
    plugins:
      - mise#a5845c5082d3a4fe36dd77ae74973dfc86fc91a2:
          version: "2026.5.12"
    cache:
      paths:
        - "~/.local/share/mise"
        - "~/.cache/mise"
        - "~/.local/state/mise"
      size: "20g"
      name: "mise-cache"
    agents:
      queue: cleanroom-mac

  - label: ":rocket: Publish release"
    key: "release-publish"
    depends_on:
      - "release-linux-arm64"
      - "release-darwin-arm64"
    if: build.tag != null
    command: |
      mise install
      scripts/ci-buildkite-release.sh
    plugins:
      - mise#a5845c5082d3a4fe36dd77ae74973dfc86fc91a2:
          version: "2026.5.12"
    cache:
      paths:
        - "~/.local/share/mise"
        - "~/.cache/mise"
        - "~/.local/state/mise"
      size: "20g"
      name: "mise-cache"
    agents:
      queue: hosted
